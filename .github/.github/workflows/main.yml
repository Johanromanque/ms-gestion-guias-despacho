name: CI/CD DockerHub y EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir imagen Docker
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ms-gestion-guias-despacho:latest .

      - name: Publicar imagen en DockerHub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/ms-gestion-guias-despacho:latest

      - name: Preparar llave SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Desplegar en EC2
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
            echo ${{ secrets.DOCKERHUB_TOKEN }} | sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ms-gestion-guias-despacho:latest
            sudo docker stop ms-guias || true
            sudo docker rm ms-guias || true
            sudo docker stop ms-gestion-guias-despacho || true
            sudo docker rm ms-gestion-guias-despacho || true
            sudo docker run -d --name ms-gestion-guias-despacho \
              -p 8080:8080 \
              -v /mnt/efs:/app/efs \
              -e EFS_PATH=/app/efs \
              -e S3_BUCKET=${{ secrets.S3_BUCKET }} \
              -e AWS_REGION=${{ secrets.AWS_REGION }} \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/ms-gestion-guias-despacho:latest
          EOF
